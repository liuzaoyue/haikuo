<body>

<script>
// ====================== 全局变量统一归集（全部置顶，无重复、无重名） ======================
// 播放控制
let playAutoMode = true;
let videoPlayerDom = null;
let ctrlButtonsDom = null;
let pauseIconDom = null;
let playIconDom = null;
let totalTimeStr = "00:00";

// 列表与历史
let videoPlayList = [];
let videoHistoryList = [];
let currentHistoryIndex = -1;
let listIndex = 0;

// 预加载控制
let preloadCacheUrl = null;
let isBackgroundPreloading = false;
let stopAllPreload = false;
let preloadFailTotal = 0;

// 换源全局接口地址（原全局url，彻底规避局部重名）
let globalApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();

// 进度条定时器
let dragProgressHideTimer = null;

// 视频校验复用DOM
let tempCheckVideoDom = null;
let isVideoChecking = false;

// 弹窗菜单状态
let sourceMenuOpen = false;

// 滑动手势坐标
let touchStartX = 0;
let touchStartY = 0;

// 长按倍速计时器
let longTouchTimer = null;

// 视频加载失败计数
let videoLoadErrorCount = 0;
let historyVideoErrorCount = 0;

// ====================== 公共工具函数 ======================
/**
 * 格式化秒数为 00:00
 */
function formatTime(seconds) {
    if (isNaN(seconds)) return "00:00";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
}

/**
 * 弹出提示框
 */
function showTip(text) {
    document.getElementById("tipMessage").textContent = text;
    document.getElementById("myModal").style.display = "flex";
    setTimeout(() => {
        document.getElementById("myModal").style.display = "none";
    }, 3000);
}

/**
 * 自动隐藏控制按钮
 */
function hideControlPanel() {
    setTimeout(() => {
        ctrlButtonsDom.style.opacity = 0;
        playIconDom.style.opacity = 0;
    }, 3000)
}

/**
 * 判断视频地址是否存在历史记录（http/https兼容）
 */
function isVideoUrlRepeat(checkUrl) {
    const fixedUrl = checkUrl.replace(/^http:/, "https:");
    return videoHistoryList.some(item => item.replace(/^http:/, "https:") === fixedUrl);
}

/**
 * 写入播放历史（仅校验通过视频调用）
 */
function saveVideoToHistory(videoSrc) {
    videoHistoryList.push(videoSrc);
    currentHistoryIndex = videoHistoryList.length - 1;
}

/**
 * 切换拖动进度条显示/隐藏
 */
function toggleDragProgressBar() {
    clearTimeout(dragProgressHideTimer);
    const progressWrap = document.getElementById("dragProgressBox");
    if (progressWrap.style.display === "block") {
        progressWrap.style.display = "none";
    } else {
        progressWrap.style.display = "block";
        dragProgressHideTimer = setTimeout(() => {
            progressWrap.style.display = "none";
        }, 3000);
    }
}

/**
 * 滑动角度计算工具
 */
function getSlideAngle(offsetX, offsetY) {
    return Math.atan2(offsetY, offsetX) * 180 / Math.PI;
}

/**
 * 判断滑动方向 1上 2下 3左 4右 0无滑动
 */
function getSlideDirection(startX, startY, endX, endY) {
    const offsetX = endX - startX;
    const offsetY = endY - startY;
    if (Math.abs(offsetX) < 70 && Math.abs(offsetY) < 70) return 0;
    const angle = getSlideAngle(offsetX, offsetY);
    if (angle >= -135 && angle <= -45) return 1;
    if (angle > 45 && angle < 135) return 2;
    if ((angle >= 135 && angle <= 180) || (angle >= -180 && angle < -135)) return 3;
    if (angle >= -45 && angle <= 45) return 4;
    return 0;
}

// ====================== 视频播放校验（复用单个DOM，优化大量DOM创建问题） ======================
function initTempCheckVideo() {
    if (tempCheckVideoDom) return;
    tempCheckVideoDom = document.createElement('video');
    tempCheckVideoDom.style.position = 'absolute';
    tempCheckVideoDom.style.width = '1px';
    tempCheckVideoDom.style.height = '1px';
    tempCheckVideoDom.style.opacity = '0';
    tempCheckVideoDom.preload = 'metadata';
    tempCheckVideoDom.muted = true;
    document.body.appendChild(tempCheckVideoDom);
}

function checkMp4Playable(src) {
    return new Promise(async (resolve) => {
        initTempCheckVideo();
        if (isVideoChecking) {
            const waitLockTimer = setInterval(() => {
                if (!isVideoChecking) {
                    clearInterval(waitLockTimer);
                    runCheckLogic();
                }
            }, 50);
            return;
        }
        runCheckLogic();

        function runCheckLogic() {
            isVideoChecking = true;
            tempCheckVideoDom.src = '';
            tempCheckVideoDom.load();
            let timeoutTimer = null;

            function cleanCheckEvent() {
                clearTimeout(timeoutTimer);
                tempCheckVideoDom.onloadedmetadata = null;
                tempCheckVideoDom.onerror = null;
                isVideoChecking = false;
            }

            tempCheckVideoDom.onloadedmetadata = () => {
                cleanCheckEvent();
                resolve(true);
            };
            tempCheckVideoDom.onerror = () => {
                cleanCheckEvent();
                resolve(false);
            };
            tempCheckVideoDom.src = src;
            tempCheckVideoDom.load();
            timeoutTimer = setTimeout(() => {
                cleanCheckEvent();
                resolve(false);
            }, 5000);
        }
    });
}

// ====================== 预加载下一条视频 ======================
async function preloadNextVideoSource() {
    if (isBackgroundPreloading || stopAllPreload) return;
    if (preloadFailTotal >= 5) {
        fba.log("预加载连续失败5次，暂停预加载");
        preloadFailTotal = 0;
        return;
    }
    isBackgroundPreloading = true;
    preloadCacheUrl = null;
    try {
        const reqApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();
        const fetchRes = await fetch(reqApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "paged=1&circle_id=2&type=all&order_by=random&role=all&file=video&status=&author=0"
        });
        const resData = await fetchRes.json();
        const videoDataArr = resData.data;
        const randomIndex = Math.floor(Math.random() * videoDataArr.length);
        let tempPlayUrl = videoDataArr[randomIndex].attachment.video[0].link;
        tempPlayUrl = tempPlayUrl.replace(/http:\/\/wulishe\.site\/wp-content\/uploads/, "https://file.wifou.com/d/139/list/wulishe");

        // 循环解析中转链接，最多8次
        const maxRedirectRetry = 8;
        let retryCount = 0;
        while (/file\.wifou\.com/.test(tempPlayUrl) && retryCount < maxRedirectRetry) {
            retryCount++;
            fba.log(`预加载第${retryCount}次解析重定向`);
            const reqResult = JSON.parse(request(tempPlayUrl, { onlyHeaders: true }));
            tempPlayUrl = reqResult.url;
        }
        // 中转链接解析失败，重新预加载
        if (/file\.wifou\.com/.test(tempPlayUrl)) {
            fba.log("多次解析仍为中转地址，丢弃本条");
            preloadFailTotal++;
            await preloadNextVideoSource();
            return;
        }
        // 历史重复跳过
        if (isVideoUrlRepeat(tempPlayUrl)) {
            await preloadNextVideoSource();
            return;
        }
        // 校验视频可用性
        const canPlay = await checkMp4Playable(tempPlayUrl);
        if (canPlay) {
            preloadCacheUrl = tempPlayUrl;
            preloadFailTotal = 0;
            fba.log("预加载完成，缓存地址：" + preloadCacheUrl);
        } else {
            preloadFailTotal++;
            await preloadNextVideoSource();
        }
    } catch (error) {
        preloadFailTotal++;
        console.error("预加载异常：", error);
    } finally {
        isBackgroundPreloading = false;
    }
}

// ====================== 加载列表下一条视频 ======================
async function loadNextSource() {
    // 优先使用预缓存
    if (preloadCacheUrl) {
        const playUrl = preloadCacheUrl;
        preloadCacheUrl = null;
        const canPlay = await checkMp4Playable(playUrl);
        if (canPlay) {
            videoPlayerDom.src = playUrl;
            saveVideoToHistory(playUrl);
            showTip('切换下一个');
            preloadNextVideoSource();
        } else {
            showTip("预加载视频失效，重新获取");
            preloadNextVideoSource();
        }
        return;
    }
    // 历史已到末尾
    if (currentHistoryIndex >= videoHistoryList.length - 1) {
        if (/txqq|doumei|kuaiyuhudong/.test(globalApiUrl)) {
            listIndex++;
            await loadVideoFromList();
            showTip('切换下一个');
            return;
        }
        showTip("无更多历史视频，加载新资源");
        await loadAllSource();
        return;
    }
    // 读取下一条历史
    currentHistoryIndex++;
    const realPlayUrl = videoHistoryList[currentHistoryIndex];
    const canPlay = await checkMp4Playable(realPlayUrl);
    if (canPlay) {
        videoPlayerDom.src = realPlayUrl;
        showTip('切换下一个');
    } else {
        showTip("本条历史视频失效，自动跳过");
        videoHistoryList.splice(currentHistoryIndex, 1);
        currentHistoryIndex--;
        await loadNextSource();
    }
}

// ====================== 加载历史上一条视频 ======================
async function loadPrevSource() {
    if (historyVideoErrorCount >= 3) {
        showTip("多条历史视频失效，无法回看");
        historyVideoErrorCount = 0;
        return;
    }
    preloadCacheUrl = null;
    if (currentHistoryIndex <= 0) {
        showTip("已经是第一个视频，无法切换上一个");
        return;
    }
    currentHistoryIndex--;
    const realPlayUrl = videoHistoryList[currentHistoryIndex];
    const canPlay = await checkMp4Playable(realPlayUrl);
    if (canPlay) {
        videoPlayerDom.src = realPlayUrl;
        showTip('切换上一个');
        historyVideoErrorCount = 0;
    } else {
        historyVideoErrorCount++;
        showTip("该历史视频已失效，自动切换下一条");
        videoHistoryList.splice(currentHistoryIndex, 1);
        currentHistoryIndex++;
        await loadPrevSource();
    }
}

// ====================== 列表模式加载单条视频 ======================
async function loadVideoFromList() {
    if (listIndex >= videoPlayList.length) {
        showTip('视频列表播放完毕，重新加载新视频');
        await loadAllSource();
        listIndex = 0;
        return;
    }
    const sourceUrl = videoPlayList[listIndex];
    if (isVideoUrlRepeat(sourceUrl)) {
        await loadVideoFromList();
        return;
    }
    const canPlay = await checkMp4Playable(sourceUrl);
    if (canPlay) {
        videoPlayerDom.src = sourceUrl;
        saveVideoToHistory(sourceUrl);
    } else {
        videoPlayList.splice(listIndex, 1);
        showTip("视频文件损坏，已自动跳过");
        await loadVideoFromList();
    }
}

// ====================== 统一入口：加载全部源（原players） ======================
async function loadAllSource() {
    videoPlayList = [];
    listIndex = 0;
    stopAllPreload = true;
    preloadCacheUrl = null;
    isBackgroundPreloading = false;
    setTimeout(() => stopAllPreload = false, 1000);
    const reqApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();

    // 屋里社接口
    async function loadWuLiSheSource() {
        return fetch(reqApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "paged=1&circle_id=2&type=all&order_by=random&role=all&file=video&status=&author=0"
        }).then(res => res.json()).then(async resData => {
            const videoDataArr = resData.data;
            const randomIndex = Math.floor(Math.random() * videoDataArr.length);
            let tempPlayUrl = videoDataArr[randomIndex].attachment.video[0].link;
            tempPlayUrl = tempPlayUrl.replace(/http:\/\/wulishe\.site\/wp-content\/uploads/, "https://file.wifou.com/d/139/list/wulishe");
            fba.log(tempPlayUrl);
            const canPlay = await checkMp4Playable(tempPlayUrl);
            if (canPlay) {
                videoPlayerDom.src = tempPlayUrl;
                saveVideoToHistory(tempPlayUrl);
                preloadNextVideoSource();
            } else {
                showTip("视频失效，重新加载");
                await loadAllSource();
            }
        }).catch((error) => {
            showTip("屋里社接口失败，切换其他源");
            throw error;
        })
    }

    // DJ接口
    async function loadDjSource() {
        try {
            const fetchRes = await fetch(reqApiUrl);
            if (!fetchRes.ok) throw new Error("接口请求失败");
            const htmlText = await fetchRes.text();
            const matchArr = htmlText.match(/data-url="(.*?)"/g) || [];
            if (matchArr.length === 0) {
                showTip("DJ接口未获取视频");
                return;
            }
            const taskList = [];
            for (let i = 0; i < matchArr.length; i++) {
                const path = matchArr[i].split('"')[1];
                const detailUrl = reqApiUrl + path;
                taskList.push(new Promise(resolve => {
                    $.get(detailUrl, data => {
                        const match = data.match(/audiodiv" src="(.*?)"/);
                        if (match?.[1]) videoPlayList.push(match[1]);
                        resolve();
                    })
                }))
            }
            await Promise.all(taskList);
            if (videoPlayList.length === 0) {
                showTip("未解析到DJ视频地址");
                return;
            }
            await loadVideoFromList();
        } catch (error) {
            showTip("DJ接口加载失败，2秒重试");
            setTimeout(loadDjSource, 2000);
            console.error(error);
        }
    }

    // JSON列表接口（抖妹、txqq）
    async function loadJsonListSource() {
        try {
            const fetchRes = await fetch(reqApiUrl);
            const resData = await fetchRes.json();
            const videoDataArr = resData.list || resData.data || [];
            for (let i = 0; i < videoDataArr.length; i++) {
                const sourceUrl = videoDataArr[i].video_url || videoDataArr[i].content;
                if (sourceUrl) videoPlayList.push(sourceUrl);
            }
            await loadVideoFromList();
        } catch (error) {
            showTip("列表接口加载失败");
            fba.log("loadJsonList异常：" + error);
        }
    }

    // 通用fetch回调封装
    async function fetchSourceWithCallback(callback) {
        return new Promise((resolve) => {
            $.get(reqApiUrl, async (data, status) => {
                try {
                    let sourceUrl = "";
                    if (/ScSp|wp\.qinggongju|apihz/.test(reqApiUrl)) {
                        sourceUrl = data.video || data.视频 || data.data;
                    }
                    if (/4qb/.test(reqApiUrl)) {
                        sourceUrl = data.data.url;
                    }
                    if (/pf129/.test(reqApiUrl)) {
                        sourceUrl = data;
                  }
                    if (!sourceUrl.startsWith("http")) {
                        sourceUrl = 'https:' + sourceUrl;
                    }
                    if (isVideoUrlRepeat(sourceUrl)) {
                        showTip("视频重复，自动跳过");
                        await loadAllSource();
                        resolve();
                        return;
                    }
                    fba.log(sourceUrl)
                    const canPlay = await checkMp4Playable(sourceUrl);
                    if (canPlay) {
                        callback(sourceUrl);
                        saveVideoToHistory(sourceUrl);
                    } else {
                        showTip("视频失效，重新加载");
                        await loadAllSource();
                    }
                } catch (error) {
                    fba.log("fetchSourceWithCallback异常：" + error)
                } finally {
                    resolve();
                }
            });
        });
    }

    // 分发不同源逻辑
    if (/wulishe/.test(reqApiUrl)) {
        await loadWuLiSheSource();
    } else if (/txqq|doumei/.test(reqApiUrl)) {
        await loadJsonListSource();
    } else if (/kuaiyuhudong/.test(reqApiUrl)) {
        loadDjSource();
    } else if (/t=0|yujn|NewSp|jkapi/.test(reqApiUrl)) {
        let tempPlayUrl = JSON.parse(request(reqApiUrl, { onlyHeaders: true })).url;
        if (isVideoUrlRepeat(tempPlayUrl)) {
            showTip("该视频已播放过，重新加载新视频");
            await loadAllSource();
            return;
        }
        const canPlay = await checkMp4Playable(tempPlayUrl);
        if (canPlay) {
            videoPlayerDom.src = tempPlayUrl;
            saveVideoToHistory(tempPlayUrl);
        } else {
            showTip("视频失效，重新加载");
            await loadAllSource();
        }
    } else {
        await fetchSourceWithCallback((sourceUrl) => {
            videoPlayerDom.src = sourceUrl;
        });
    }
    playIconDom.style.opacity = 0;
}

// ====================== 页面初始化逻辑 ======================
$(document).ready(async function() {
    playAutoMode = true;
    videoPlayerDom = document.getElementById("myVideo");
    ctrlButtonsDom = document.querySelector("#buttons");
    playIconDom = document.querySelector(".play-icon");
    pauseIconDom = document.querySelector(".play-icons");
    const progressBarDom = document.getElementById('progress-bar');
    const timeTotalDom = document.getElementById('time-div');
    const timeCurDom = document.getElementById('time-divs');
    const dragSliderDom = document.getElementById("dragSlider");
    const dragCurTimeDom = document.getElementById("dragCurTime");
    const dragTotalTimeDom = document.getElementById("dragTotalTime");
    const dragProgressWrapDom = document.getElementById("dragProgressBox");

    await loadAllSource();

    // 视频元数据加载完成
    videoPlayerDom.addEventListener('loadedmetadata', () => {
        totalTimeStr = formatTime(videoPlayerDom.duration);
        timeTotalDom.textContent = totalTimeStr;
