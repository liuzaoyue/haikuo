<!DOCTYPE html>
<html lang="en">

    <style>
        *{
            margin:0px; 
            padding:0px;
            touch-action: pan-y;
            text-align: center;
            box-sizing: border-box;
            overscroll-behavior: none;
        }
        html,body{
            width:100%;
            height:100%;

            background:#000;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            
        }

        .video-scroll-wrap{
            width:100%;
            height:100vh;
            overflow:hidden;
            position: relative;
            pointer-events: auto !important;
        }
        .video-scroll-wrap::-webkit-scrollbar{
            display:none;
        }
      .video-page {
   width: 100%;
   height: 100%;
   position: absolute;
   top: 0;
   left: 0;
   /* 仅新增这一行，控制弹动阻尼，消除抖动 */
   transition: transform 0.24s cubic-bezier(0.2, 0, 0.2, 1);
 }
        #currentPage {
           z-index: 2;

           z-index: 1;
         }
        video {
           width: 100%;
           height: 100%;
           object-fit: cover;

           pointer-events: auto;

           muted;

         }

            width: 100%;
            height: 100%;
            object-fit: contain
            touch-action: none;
            position:absolute;
            top:0;
            left:0;
            
            playsinline;
            muted;
            preload: auto; /*【修复】强制预加载视频首帧，减少黑屏 */
        }
       video::-webkit-media-controls,
        video::-webkit-media-controls-enclosure,
        video::-webkit-media-controls-panel,
        video::-webkit-media-controls-play-button,
        video::-webkit-media-controls-start-playback-button, video::-webkit-media-controls-toggle-closed-captions-button,
        video::-webkit-media-controls-volume-slider,
        video::-webkit-media-controls-timeline,
        video::-webkit-media-controls-fullscreen-button {
             display:none !important;
             opacity: 0 !important;
             visibility: hidden !important;
             width: 0 !important;
             height: 0 !important;
        } 
video::-webkit-media-controls-overlay-play-button {
    display: none !important;
    opacity: 0 !important;
    visibility: hidden !important;
}
        .play-icon, .play-icons{
            display: none !important;
            width:0;
            height:0;
            opacity: 0 !important;
            pointer-events: none;
        }
       /* 拖拽进度条外层容器 居中缩短 */
#dragProgressBox{
    position: absolute;
    left: 50%;
    bottom: 5px;
    width: 90%; /* 控制长度，和截图匹配 */
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}

/* 滑块轨道 */
#dragSlider{
    width: 100%;
    height: 5px;
    background: transparent;
    outline: none;
    -webkit-appearance: none;
}
/* 轨道底色 */
#dragSlider::-webkit-slider-runnable-track{
    height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 999px;
}
/* 蓝色圆点滑块，和截图样式一致 */
#dragSlider::-webkit-slider-thumb{
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #388bff;
    margin-top: -5px;
}
/* 时间文字左右分开 */
.drag-time-text{
    display: flex;
    justify-content: space-between;
    color:#fff;
    font-size: 12px;
    margin-top: 8px;
}


        .progress, #buttons, #options, .modal{
            position: absolute;
            z-index: 99;
        }
        /* 提升按钮最高层级，不会被视频遮挡 */
        #buttons{
            position:absolute;
            bottom:150px;
            right:0px;
            opacity:0;
            z-index: 9999 !important;
            pointer-events: auto !important;
        }
        #options{
    width: 100%;
    height: 100%;
    top:0;
    left:0;
    background: rgba(0,0,0,0.8);
    display: none;
    flex-wrap: wrap;
    padding: 20px;
    gap: 12px;
    justify-content: space-between;
    align-content: flex-start;
    /* 修改：整体允许点击，只有内部按钮可交互 */
    pointer-events: auto;
}
/* 按钮恢复点击，否则源按钮点不动 */
.option{
    width: 22%;
    padding: 10px;
    background: #222;
    border-radius: 6px;
    color:#fff;
    pointer-events: auto;
}


        .modal-content{
            background: #222;
            padding:12px 24px;
            border-radius: 8px;
            color:#fff;
            z-index: 99999
        }

        </div>
    </div>

<script>
// ====================== 全局变量统一归集 ======================
let playAutoMode = true;
let videoPlayerDom = null;
let nextVideoDom = null;
let ctrlButtonsDom = null;
let totalTimeStr = "00:00";
let scrollWrap = null;
const currentPage = document.getElementById('currentPage');
const nextPage = document.getElementById('nextPage');

let videoPlayList = [];
let videoHistoryList = [];
let currentHistoryIndex = -1;
let listIndex = 0;

let globalApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();
let dragProgressHideTimer = null;
let sourceMenuOpen = false;
let longTouchTimer = null;

let videoLoadErrorCount = 0;
let historyVideoErrorCount = 0;
let retryCount = 0;
const maxRetry = 3;
let isSourceLoading = false;
const maxRedirectRetry = 5;
let globalRetryCount = 0;

let preloadNextUrl = null;
let isBackgroundPreloading = false;
let preloadFailCount = 0;
const maxPreloadFail = 5;
let stopPreload = false;

let scrollStartY = 0;
let isScrolling = false;
let scrollDelayTimer = null;
const slideThreshold = 80;
let slidePreviewLoading = false;
let isPreviewPlaying = false;
const slideHalfScreenRatio = window.innerHeight * 0.2;
let lastPreviewUrl = "";
let touchSnapIndex = -1; // 手指按下瞬间锁定当前历史下标
// ====================== 公共工具函数 ======================
function log(msg){
    if(typeof fba !== 'undefined' && fba.log) fba.log(msg);
    console.log(msg);
}

function getFinalRedirectUrl(url) {
    return fetch(url, { redirect: 'follow' })
    .then(function(r) {
        var finalUrl = r.url;                    
        log('真实地址:'+finalUrl)
        return finalUrl
    })
    .catch(e=>{log('跳转失败',e);return ''})
}

function formatTime(seconds) {
    if (isNaN(seconds)) return "00:00";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
}

function showTip(text) {
    document.getElementById("tipMessage").textContent = text;
    document.getElementById("myModal").style.display = "flex";
    setTimeout(() => {
        document.getElementById("myModal").style.display = "none";
    }, 3000);
}

function hideControlPanel() {
    setTimeout(() => {
        if(ctrlButtonsDom) ctrlButtonsDom.style.opacity = 0;
    }, 3000)
}

function isVideoUrlRepeat(checkUrl) {
    const fixedUrl = checkUrl.replace(/^http:/, "https:");
    return videoHistoryList.some(item => item.replace(/^http:/, "https:") === fixedUrl);
}

function saveVideoToHistory(videoSrc) {
    videoHistoryList.push(videoSrc);
    currentHistoryIndex = videoHistoryList.length-1 ;
    log("存入历史，当前下标："+currentHistoryIndex);
}

function toggleDragProgressBar() {
    clearTimeout(dragProgressHideTimer);
    const progressWrap = document.getElementById("dragProgressBox");
    progressWrap.style.display = "block";
    progressWrap.style.opacity = 1;
    progressWrap.style.pointerEvents = "auto";
    dragProgressHideTimer = setTimeout(() => {
        progressWrap.style.opacity = 0;
        progressWrap.style.pointerEvents = "none";
    }, 3000);
}

async function preloadNextVideo() {
    log("当前listIndex=" + listIndex + "，预加载下标=" + (listIndex+1));
    //【修复】滑动时禁止预加载覆盖预览视频
    if (stopPreload) return;
    if (isBackgroundPreloading || stopPreload || preloadNextUrl) return;
    if (preloadFailCount >= maxPreloadFail) {
        log(`预加载连续${maxPreloadFail}次失败，临时停止预加载`);
        preloadFailCount = 0;
        return;
    }   
    isBackgroundPreloading = true;
    preloadNextUrl = null;
    let tempRawUrl = "";
    try {
        if (listIndex + 1 < videoPlayList.length) {
            const rawUrl = videoPlayList[listIndex + 1];
            log('第'+(listIndex + 1)+'个****' + videoPlayList.length)
            if (rawUrl && !isVideoUrlRepeat(rawUrl)) {
                preloadNextUrl = rawUrl;
                preloadFailCount = 0;
                log("预加载列表下一条成功：" + preloadNextUrl);
            }
        } else {
            const reqApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();
            if (/wulishe/.test(reqApiUrl)) {
                const res = await fetch(reqApiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "paged=1&circle_id=2&type=all&order_by=random&role=all&file=video&status=&author=0"
                });
                if (!res.ok) throw new Error("屋里社接口请求失败");
                const resData = await res.json();
                const arr = resData.data || [];
                if (arr.length > 0) {
                    const randomItem = arr[0];
                    tempRawUrl = randomItem.attachment.video[0].link;
                    tempRawUrl = tempRawUrl.replace(/http:\/\/wulishe\.site\/wp-content\/uploads/, "https://file.wifou.com/d/139/list/wulishe");
                }
            } else if (/t=0|yujn|NewSp|jkapi/.test(reqApiUrl)) {
                tempRawUrl = reqApiUrl
            } else if (/pf129/.test(reqApiUrl)) {
                const fetchRes = await fetch(reqApiUrl);
                if (!fetchRes.ok) throw new Error("pf129接口请求失败");
                const resText = await fetchRes.text();
                const mp4Match = resText.match(/https:\/\/[^\s"]+\.mp4[^\s"]*/);
                if (mp4Match) tempRawUrl = mp4Match[0].trim();
            } else if (/kuaiyuhudong/.test(reqApiUrl)) {
                const fetchRes = await fetch(reqApiUrl);
                if (!fetchRes.ok) throw new Error("kuaiyuhudong接口1请求失败");
                const htmlText = await fetchRes.text();
                const pathMatch = htmlText.match(/data-url="(.*?)"/);
                if (!pathMatch) throw new Error("kuaiyuhudong未匹配到详情路径");
                const detailUrl = reqApiUrl + pathMatch[1];
                const fetchRess = await fetch(detailUrl);
                if (!fetchRess.ok) throw new Error("kuaiyuhudong接口2请求失败");
                const htmlTexts = await fetchRess.text();
                const srcMatch = htmlTexts.match(/audiodiv" src="(.*?)"/);
                if (!srcMatch) throw new Error("kuaiyuhudong未匹配视频地址");
                tempRawUrl = srcMatch[1];
            } else if (/txqq|doumei/.test(reqApiUrl)) {
                const fetchRes = await fetch(reqApiUrl);
                if (!fetchRes.ok) throw new Error("txqq/doumei接口请求失败");
                const resData = await fetchRes.json();
                const videoDataArr = resData.list || resData.data || [];
                if (videoDataArr.length > 0) {
                    tempRawUrl = videoDataArr[0].video_url || videoDataArr[0].content;
                }
            } else {
                const fetchRes = await fetch(reqApiUrl);
                if (!fetchRes.ok) throw new Error("通用接口请求失败");
                const resData = await fetchRes.json();
                tempRawUrl = resData.video || resData.视频 || resData.data;
                if (/4qb/.test(reqApiUrl)) {
                    tempRawUrl = resData.data.url;
                }
            }

            let realUrl = tempRawUrl;
            const wulisheDomain = /file\.wifou\.com\/d\/139\/list\/wulishe/;
            const isNormalVideo = /(?:\.mp4|\.m3u8|\.flv)(\?|#|_|$)/.test(tempRawUrl);
            const needRedirect = !isNormalVideo || wulisheDomain.test(tempRawUrl);
            if (tempRawUrl && needRedirect) {
                realUrl = await getFinalRedirectUrl(tempRawUrl);
            }
            if (realUrl && !isVideoUrlRepeat(realUrl)) {
                preloadNextUrl = realUrl;
                preloadFailCount = 0;
                log("预加载新接口视频成功：" + preloadNextUrl);
            }
        }
    } catch (err) {
        preloadFailCount++;
        log("预加载失败：" + err);
    } finally {
        isBackgroundPreloading = false;
        // 预加载完成赋值给预览播放器，提前缓存画面
        if(preloadNextUrl) {
            nextVideoDom.src = preloadNextUrl;
            nextVideoDom.load();
        }
    }
}

async function loadNextSource() {
    if (currentHistoryIndex >= videoHistoryList.length - 1) {
        if (/txqq|doumei|kuaiyuhudong/.test(globalApiUrl)) {
            listIndex++;
            await loadVideoFromList();
            setTimeout(()=> preloadNextVideo(), 200);
            showTip('切换下一个');
            return;
        }     
        showTip("无更多历史视频，加载新资源");
        await loadVideoFromList() ;     
        setTimeout(()=> preloadNextVideo(), 200);  
        return;
    }
    currentHistoryIndex++;
    const realPlayUrl = videoHistoryList[currentHistoryIndex];
    videoPlayerDom.src = realPlayUrl; 
    showTip('切换下一个');
    setTimeout(()=>{
        currentPage.style.transform = 'translateY(0)';
        nextPage.style.transform = 'translateY(100vh)';
    },50);
}

async function loadPrevSource() {
    if (historyVideoErrorCount >= 3) {
        showTip("多条历史视频失效，无法回看");
        historyVideoErrorCount = 0;
        return;
    }
    if (currentHistoryIndex <= 0) {
        showTip("已经是第一个视频，无法切换上一个");
        return;
    }
    log('ccccccc'+currentHistoryIndex)
   // currentHistoryIndex--;
    const realPlayUrl = videoHistoryList[currentHistoryIndex];
    if(isVideoUrlRepeat(realPlayUrl)){
        showTip("历史视频重复，自动加载新视频");
        await loadAllSource();
        return;
    }
    videoPlayerDom.src = realPlayUrl;
    videoPlayerDom.muted = false;
    videoPlayerDom.play().catch(()=>{});
    showTip('切换上一个');
    historyVideoErrorCount = 0;
    preloadNextUrl = null;
    setTimeout(()=>{
        currentPage.style.transform = 'translateY(0)';
    },50);
}

async function loadVideoFromList() {
    if(preloadNextUrl){
        const cacheUrl = preloadNextUrl;
        preloadNextUrl = null;
        nextVideoDom.src = "";
       nextVideoDom.load();
        videoPlayerDom.src = cacheUrl;
        saveVideoToHistory(cacheUrl);
        setTimeout(()=> preloadNextVideo(), 100);
        return;
    }
    if (listIndex >= videoPlayList.length) {
        showTip('视频列表播放完毕，重新加载新视频');
        await loadAllSource();
        listIndex = 0;
        return;
    }
    const sourceUrl = videoPlayList[listIndex];
    if (isVideoUrlRepeat(sourceUrl)) {
        listIndex++;
        await loadVideoFromList();
        return;
    }
    videoPlayerDom.src = sourceUrl;
    saveVideoToHistory(sourceUrl);
}

async function loadAllSource() {
    videoPlayList = [];
    listIndex = 0;
    const reqApiUrl = localStorage.getItem('jjurl') || 'https://v.nrzj.vip/video.php?_t=' + Math.random();

    async function loadWuLiSheSource() {
        if (isSourceLoading) return;
        isSourceLoading = true;
        let hasPlayStart = false;
        try {
            const res = await fetch(reqApiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "paged=1&circle_id=2&type=all&order_by=random&role=all&file=video&status=&author=0"
            });
            const resData = await res.json();
            const videoDataArr = resData.data || [];
            if (!Array.isArray(videoDataArr) || videoDataArr.length === 0) {
                throw new Error("接口无视频数据");
            }
            for (let i = 0; i < videoDataArr.length; i++) {        
                const item = videoDataArr[i];        
                let tempPlayUrl = item.attachment.video[0].link;
                tempPlayUrl = tempPlayUrl.replace(/http:\/\/wulishe\.site\/wp-content\/uploads/, "https://file.wifou.com/d/139/list/wulishe");        
                const realUrl = await getFinalRedirectUrl(tempPlayUrl);
                if (!realUrl) {
                    log(`第${i+1}条视频跳转解析失败，跳过本条`);
                    continue;
                }
                tempPlayUrl = realUrl;
                if (isVideoUrlRepeat(tempPlayUrl)) {
                    log(`第${i+1}条视频历史重复，跳过本条`);
                    continue;
                }
                videoPlayList.push(tempPlayUrl);
                globalRetryCount = 0;
                if (videoPlayList.length === 1 && !hasPlayStart) {
                    hasPlayStart = true;
                    (async () => {
                        listIndex = 0;
                        await loadVideoFromList();
                    })();
                }
            }
            if (videoPlayList.length === 0) {
                showTip("未获取到可用视频资源");
                isSourceLoading = false;
                return;
            }
        } catch (error) {
            log("屋里社加载异常：" + error);
            showTip("屋里社接口失败，切换其他源");
            globalRetryCount++;
            if (globalRetryCount >= maxRetry) {
                showTip("多次加载失败，请手动切换源");
                globalRetryCount = 0;
                isSourceLoading = false;
                return;
            }
            isSourceLoading = false;
            await loadAllSource();
            return;
        }
        isSourceLoading = false;
    }

    async function loadDjSource() {
        try {
            const fetchRes = await fetch(reqApiUrl);
            if (!fetchRes.ok) throw new Error("接口请求失败");
            const htmlText = await fetchRes.text();
            const matchArr = htmlText.match(/data-url="(.*?)"/g) || [];
            if (matchArr.length === 0) {
                showTip("DJ接口未获取视频");
                return;
            }
            const taskList = [];
            for (let i = 0; i < matchArr.length; i++) {
                const path = matchArr[i].split('"')[1];
                const detailUrl = reqApiUrl + path;
                taskList.push(new Promise(resolve => {
                    $.get(detailUrl, data => {
                        const match = data.match(/audiodiv" src="(.*?)"/);
                        if (match?.[1]) videoPlayList.push(match[1]);
                        resolve();
                    })
                }))
            }
            await Promise.all(taskList);
            if (videoPlayList.length === 0) {
                showTip("未解析到DJ视频地址");
                return;
            }
            await loadVideoFromList();
            setTimeout(()=> preloadNextVideo(), 200);
        } catch (error) {
            showTip("DJ接口加载失败，2秒重试");
            setTimeout(loadDjSource, 2000);
            console.error(error);
        }
    }

    async function loadJsonListSource() {
        try {
            const fetchRes = await fetch(reqApiUrl);
            const resData = await fetchRes.json();
            const videoDataArr = resData.list || resData.data || [];
            for (let i = 0; i < videoDataArr.length; i++) {
                const sourceUrl = videoDataArr[i].video_url || videoDataArr[i].content;
                if (sourceUrl) videoPlayList.push(sourceUrl);
            }
            await loadVideoFromList();
            setTimeout(()=> preloadNextVideo(), 200);
        } catch (error) {
            showTip("列表接口加载失败");
            log("loadJsonList异常：" + error);
        }
    }

    async function fetchSourceWithCallback(callback) {
        return new Promise((resolve) => {
            $.get(reqApiUrl, async (data, status) => {
                try {
                    let sourceUrl = "";
                    if (/ScSp|wp\.qinggongju|apihz/.test(reqApiUrl)) {
                        sourceUrl = data.video || data.视频 || data.data;
                    }
                    if (/4qb/.test(reqApiUrl)) {
                        sourceUrl = data.data.url;
                    }
                    if (/pf129|diskgirl|douyidou|wwgz/.test(reqApiUrl)) {
                        sourceUrl = data;
                    }
                    if (!sourceUrl.startsWith("http")) {
                        sourceUrl = 'https:' + sourceUrl;
                    }
                    if (isVideoUrlRepeat(sourceUrl)) {
                        showTip("视频重复，自动跳过");
                        await loadAllSource();
                        resolve();
                        return;
                    }
                    callback(sourceUrl);
                    saveVideoToHistory(sourceUrl);
                    setTimeout(()=> preloadNextVideo(), 200);
                } catch (error) {
                    log("fetchSourceWithCallback异常：" + error)
                } finally {
                    resolve();
                }
            });
        });
    }

    if (/wulishe/.test(reqApiUrl)) {
        await loadWuLiSheSource();
    } else if (/txqq|doumei/.test(reqApiUrl)) {
        await loadJsonListSource();
    } else if (/kuaiyuhudong/.test(reqApiUrl)) {
        loadDjSource();
    } else if (/t=0|yujn|NewSp|jkapi/.test(reqApiUrl)) {
        const tempPlayUrl = await getFinalRedirectUrl(reqApiUrl);

        });

scrollWrap.addEventListener('touchstart', (e) => {
    if (sourceMenuOpen) return;
    touchStartY = e.touches[0].clientY;
    touchMoveY = 0;
    isDragging = true;
    stopPreload = true; // 滑动全程禁止预加载，杜绝新视频覆盖画面
    slidePreviewLoading = false;
    isPreviewPlaying = false;
    touchSnapIndex = currentHistoryIndex; // 锁定按下时的下标，全程不变
    currentPage.style.transition = 'none';
    nextPage.style.transition = 'none';

    longPressTimer = setTimeout(() => {
        videoPlayerDom.playbackRate = 2;
        log("长按2倍速");
    }, 200);
}, { passive: true });


scrollWrap.addEventListener('touchmove', (e) => {
    if (sourceMenuOpen || !isDragging) return;
    // 删掉阻止滑动代码，修复手势失效
    touchMoveY = e.touches[0].clientY - touchStartY;
    // 最大拖拽距离改为0.9，几乎全屏滑动不卡顿
    const maxMove = window.innerHeight * 0.9;
    touchMoveY = Math.max(-maxMove, Math.min(maxMove, touchMoveY));

    if(touchMoveY < 0){
        currentPage.style.transform = `translateY(${touchMoveY}px)`;
        nextPage.style.transform = `translateY(calc(100vh + ${touchMoveY}px))`;
    }else{
        currentPage.style.transform = `translateY(${touchMoveY}px)`;
        nextPage.style.transform = `translateY(calc(-100vh + ${touchMoveY}px))`;
    }

    const moveAbs = Math.abs(touchMoveY);
    const isOverHalf = moveAbs >= slideHalfScreenRatio;
    let targetPreviewUrl = "";

    // 上滑预览下一条
  // 上滑：无预加载直接读取列表下一条
if (touchMoveY < -10) {
    if(preloadNextUrl){
        targetPreviewUrl = preloadNextUrl;
    }else if(listIndex + 1 < videoPlayList.length){
        // 没有预加载，直接拿列表下一条作为预览
        targetPreviewUrl = videoPlayList[listIndex + 1];
    }
}

    // 下滑预览历史上一条
    else if (touchMoveY > 10) {
        if(touchSnapIndex > 0){
            targetPreviewUrl = videoHistoryList[touchSnapIndex - 1];
        }
    }

    if(targetPreviewUrl && targetPreviewUrl !== lastPreviewUrl){
        lastPreviewUrl = targetPreviewUrl;
        nextVideoDom.src = targetPreviewUrl;
        nextVideoDom.load();
    }

    if(targetPreviewUrl){
        if (isOverHalf) {
            videoPlayerDom.pause();
            nextVideoDom.play().catch(()=>{});
            isPreviewPlaying = true;
        } else {
            nextVideoDom.pause();
            videoPlayerDom.play();
            isPreviewPlaying = false;
        }
    }else if(isPreviewPlaying){
        nextVideoDom.pause();
        videoPlayerDom.play();
        isPreviewPlaying = false;
        lastPreviewUrl = "";
    }
}, { passive: true });



scrollWrap.addEventListener('touchend', async () => {
    lastPreviewUrl = "";
    if (longPressTimer) clearTimeout(longPressTimer);
    longPressTimer = null;
    videoPlayerDom.playbackRate = 1;

    if (isPreviewPlaying) {
        nextVideoDom.pause();
        videoPlayerDom.play();
        isPreviewPlaying = false;
    }
    if (sourceMenuOpen || !isDragging) return;

    isDragging = false;
    stopPreload = false;
    slidePreviewLoading = false;
    const threshold = window.innerHeight * 0.2;
    

      // ========== 上滑下一条 ==========
    if (touchMoveY < -threshold) {
        let playUrl = preloadNextUrl;
        // 预加载为空，直接读取列表下一条兜底
        if (!playUrl) {
            if (listIndex + 1 < videoPlayList.length) {
                playUrl = videoPlayList[listIndex + 1];
            } else {
                resetPagePos();
                showTip("暂无下一条视频");
                nextVideoDom.src = "";
                touchMoveY = 0;
                return;
            }
        }
        currentPage.style.transform = 'translateY(-100%)';
        nextPage.style.transform = 'translateY(0)';
        setTimeout(async () => {
            listIndex++
            saveVideoToHistory(playUrl)
            nextVideoDom.pause();
            videoPlayerDom.src = playUrl;
            videoPlayerDom.play().catch(()=>{});
            resetPagePos();
            preloadNextUrl = null;
            setTimeout(()=> preloadNextVideo(), 500);
        }, 200);
    }


    // ========== 下滑历史视频（修复重点） ==========
    else if (touchMoveY > threshold) {
        // 用按下瞬间的快照判断，实时currentHistoryIndex不准
        if (touchSnapIndex <= 0) {
            resetPagePos();
            showTip("已经是第一条，无历史");
            nextVideoDom.src = "";
            nextVideoDom.load();
            touchMoveY = 0;
            return;
        }
        // 固定目标下标，和滑动预览完全一致
        const targetIdx = touchSnapIndex - 1;
        const targetUrl = videoHistoryList[targetIdx];

        currentPage.style.transform = 'translateY(100%)';
        nextPage.style.transform = 'translateY(0)';
        setTimeout(async () => {
            nextVideoDom.pause();
            // 强制更新全局下标，只修改一次，无二次递减
            currentHistoryIndex = targetIdx;
            videoPlayerDom.src = targetUrl;
            videoPlayerDom.play().catch(()=>{});
            showTip("回看历史视频");
            resetPagePos();
            preloadNextUrl = null;
            // 延迟预加载，等历史视频完全加载完再拉新，不会覆盖画面
            setTimeout(()=> preloadNextVideo(), 800);
        }, 200);
    }
    // 滑动不足一半，回弹
    else {
        resetPagePos();
        nextVideoDom.pause();
        nextVideoDom.src = "";
            nextVideoDom.load();
    }
    touchMoveY = 0;
});


scrollWrap.addEventListener('touchcancel', () => {
    if (longPressTimer) clearTimeout(longPressTimer);
    longPressTimer = null;
    videoPlayerDom.playbackRate = 1;
    if (isPreviewPlaying) {
        nextVideoDom.pause();
        videoPlayerDom.play();
        isPreviewPlaying = false;
    }
    isDragging = false;
    touchMoveY = 0;
    slidePreviewLoading = false;
    // 意外中断直接无动画归位，杜绝弹跳
    currentPage.style.transition = "none";
    nextPage.style.transition = "none";
    resetPagePos();
});

function resetPagePos() {
    currentPage.style.transform = 'translateY(0)';
    nextPage.style.transform = 'translateY(100%)';
}
