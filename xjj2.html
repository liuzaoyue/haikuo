<script>
const VideoDB = {
    dbName: "videoCacheDB",
    storeName: "videoFiles",
    db: null,
    // 初始化库
    init() {
        return new Promise((resolve, reject) => {
            // 版本号从1改成2，必须升版才能执行onupgradeneeded建表
            const req = indexedDB.open(this.dbName, 2);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                // 原有视频缓存仓库
                if (!db.objectStoreNames.contains(this.storeName)) {
                    db.createObjectStore(this.storeName, {
                        keyPath: "url"
                    });
                }
                // 新增播放进度仓库，主键url，和读写方法对应
                if (!db.objectStoreNames.contains("progress")) {
                    db.createObjectStore("progress", {
                        keyPath: "url"
                    });
                }
            };
            req.onsuccess = (e) => {
                this.db = e.target.result;
                resolve();
            };
            req.onerror = reject;
        })
    },
    // 读取单条缓存视频blob
    get(url) {
        return new Promise((resolve) => {
            if (!this.db) return resolve(null);
            const t = this.db.transaction(this.storeName, "readonly");
            const store = t.objectStore(this.storeName);
            const req = store.get(url);
            req.onsuccess = () => resolve(req.result ? .blob || null);
        })
    },
    // 获取全部缓存列表
    getAllCache() {
        return new Promise((resolve, reject) => {
            if (!this.db) return resolve([]);
            const t = this.db.transaction(this.storeName, "readonly");
            const store = t.objectStore(this.storeName);
            const req = store.getAll();
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = reject;
        })
    },
    // 存入本地缓存
    save(url, blob, cover = "") {
        return new Promise((resolve, reject) => {
            if (!this.db) return resolve();
            const t = this.db.transaction(this.storeName, "readwrite");
            const store = t.objectStore(this.storeName);
            const req = store.put({
                url,
                blob,
                cover,
                time: Date.now()
            });
            req.onsuccess = () => resolve();
            req.onerror = (e) => reject(e);
        })
    },
    // 清空全部缓存
    clear() {
        return new Promise((resolve, reject) => {
            if (!this.db) return resolve();
            const transaction = this.db.transaction(this.storeName, "readwrite");
            const store = transaction.objectStore(this.storeName);
            const clearReq = store.clear();
            transaction.oncomplete = () => {
                resolve();
            };
            transaction.onerror = (err) => reject(err.target.error);
        })
    },

    // ============ 新增播放进度相关方法 ============
    // 保存播放进度
    savePlayProgress(videoUrl, currentTime) {
        return new Promise((resolve) => {
            if (!this.db) return resolve();
            const t = this.db.transaction("progress", "readwrite");
            const store = t.objectStore("progress");
            store.put({
                url: videoUrl,
                time: currentTime,
                updateTime: Date.now()
            });
            resolve();
        });
    },
    // 获取视频上次播放进度
    getPlayProgress(videoUrl) {
        return new Promise((resolve) => {
            if (!this.db) return resolve(0);
            const t = this.db.transaction("progress", "readonly");
            const store = t.objectStore("progress");
            const req = store.get(videoUrl);
            req.onsuccess = () => {
                const record = req.result;
                // 存在记录且播放时长大于1秒才返回
                if (record && record.time > 1) {
                    resolve(record.time);
                } else {
                    resolve(0);
                }
            };
        });
    },
    // 播放完成清除进度
    clearPlayProgress(videoUrl) {
        return new Promise((resolve) => {
            if (!this.db) return resolve();
            const t = this.db.transaction("progress", "readwrite");
            const store = t.objectStore("progress");
            store.delete(videoUrl);
            resolve();
        });
    }
};

// 下载缓存视频文件
// 下载IndexedDB内缓存的视频二进制，不走网络链接
async function downloadCacheBlob(targetNetUrl) {
    log("执行本地缓存导出，链接：" + targetNetUrl);
    let tempBlobUrl = "";
    try {
        await VideoDB.init();
        const allCache = await VideoDB.getAllCache();
        const cacheItem = allCache.find(item => item.url === targetNetUrl);

        if (!cacheItem) {
            showTip("缓存数据不存在");
            return;
        }
        if (!cacheItem.blob) {
            showTip("缓存文件缺失，无法导出");
            return;
        }
        tempBlobUrl = URL.createObjectURL(cacheItem.blob);
        const aTag = document.createElement("a");
        aTag.href = tempBlobUrl;
        aTag.download = "缓存视频.mp4";
        document.body.appendChild(aTag);
        aTag.click();
        aTag.remove();
        showTip("本地缓存导出完成，不消耗流量");
    } catch (err) {
        log("缓存导出失败：" + err);
        showTip("导出失败");
    } finally {
        if (tempBlobUrl) {
            URL.revokeObjectURL(tempBlobUrl);
        }
    }
}

/**
 * 统一处理视频url：读取本地blob缓存、释放旧blob、赋值播放器
 */
async function preCacheOnly(sourceUrl, coverImg = "") {
    const localBlob = await VideoDB.get(sourceUrl);
    if (localBlob) {
        log(`预缓存跳过：已存在缓存 ${sourceUrl}`);
        return;
    }
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 20000);
    try {
        const res = await fetch(sourceUrl, {
            cache: "default",
            signal: controller.signal
        });
        clearTimeout(timer);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        await VideoDB.save(sourceUrl, blob, coverImg);
        log(`预缓存成功：${sourceUrl}`);
    } catch (err) {
        clearTimeout(timer);
        if (err.name === "AbortError") {
            log(`预缓存超时放弃：${sourceUrl}`);
        } else {
            const msg = err instanceof Error ? err.message : "非标准捕获异常";
            log(`预缓存失败 ${sourceUrl} | ${msg}`);
        }
    }
}

async function getCachedVideoPlayUrl(sourceUrl, autoSave = false) {
    let playUrl = sourceUrl;
    const localBlob = await VideoDB.get(sourceUrl);
    if (localBlob) {
        playUrl = URL.createObjectURL(localBlob);
        log(`命中本地缓存：${sourceUrl}`);
    } else if (autoSave) {
        try {
            const res = await fetch(sourceUrl, {
                cache: "default"
            });
            const blob = await res.blob();
            const coverImg = window.videoCoverMap ? .get(sourceUrl) || "";
            await VideoDB.save(sourceUrl, blob, coverImg);
            // log(`已缓存视频到本地：${sourceUrl} 封面：${coverImg}`);
            playUrl = URL.createObjectURL(blob);
        } catch (err) {
            log(`缓存失败: ${sourceUrl}`, err);
        }
    }
    revokeBlobUrl(videoPlayerDom);
    videoPlayerDom.src = playUrl;
    log("当前播放地址：" + videoPlayerDom.src);
    return playUrl;
}

//检测MP4
function checkVideoUsable(videoUrl) {
    return new Promise((resolve) => {
        const tempVideo = document.createElement('video');
        tempVideo.style.display = 'none';
        document.body.appendChild(tempVideo);

        let timer = setTimeout(() => {
            tempVideo.remove();
            resolve(false);
        }, 3000);

        tempVideo.addEventListener('canplay', () => {
            clearTimeout(timer);
            tempVideo.remove();
            resolve(true);
        }, {
            once: true
        });

        tempVideo.addEventListener('error', () => {
            clearTimeout(timer);
            tempVideo.remove();
            resolve(false);
        }, {
            once: true
        });
        tempVideo.preload = "metadata"; // 仅加载视频信息，不预加载画面
        tempVideo.src = videoUrl;
        tempVideo.load();
    });
}

/**
 * 滑动角度计算工具
 */
function getSlideAngle(offsetX, offsetY) {
    return Math.atan2(offsetY, offsetX) * 180 / Math.PI;
}

/**
 * 判断滑动方向 1上滑(下一个) 2下滑(上一个) 3左 4右 0无滑动
 */
function getSlideDirection(startX, startY, endX, endY) {
    const offsetX = endX - startX;
    const offsetY = endY - startY;
    if (Math.abs(offsetX) < 70 && Math.abs(offsetY) < 70) return 0;
    const angle = getSlideAngle(offsetX, offsetY);
    if (angle >= -135 && angle <= -45) return 1;
    if (angle > 45 && angle < 135) return 2;
    if ((angle >= 135 && angle <= 180) || (angle >= -180 && angle < -135)) return 3;
    if (angle >= -45 && angle <= 45) return 4;
    return 0;
}

// 限制并发缓存
function runLimitCache(urlArr, maxParallel = 3) {
    if (!urlArr || urlArr.length === 0) return;
    let index = 0;
    async function nextTask() {
        if (index >= urlArr.length) return;
        const url = urlArr[index++];
        preCacheOnly(url).catch(err => log(`单条缓存异常 ${url}：`, err)).finally(() => nextTask());
    }
    for (let i = 0; i < maxParallel; i++) {
        nextTask().catch(err => log("并发任务启动异常：", err));
    }
}

// ====================== 上滑看下一条视频（核心函数，已修复缓存逻辑） ======================
async function loadNextSource() {
    // 缓存模式优先拦截
    if (isLocalCachePlay) {
        // 没到缓存最后一条，下标+1播放缓存
        if (nowCacheIndex < allCacheList.length - 1) {
            nowCacheIndex++;
            renderCachePlay(nowCacheIndex);
            return;
        }
        // 缓存全部看完，退出缓存模式，走网络逻辑
        isLocalCachePlay = false;
        showTip("本地缓存全部播放完毕，加载网络资源");
    }

    // 滑到历史最后一条，退出历史切播放列表
    if (currentHistoryIndex >= videoHistoryList.length - 1) {
        // 列表还有剩余视频，直接切下一条
        if (listIndex < videoPlayList.length - 1) {
            listIndex++;
            await loadVideoFromList();
            showTip('切换下一个');
            return;
        }
        // 列表耗尽，加载新资源
        listIndex++;
        await loadAllSource();
        showTip('切换下一个');
        return;
    }

    // 还在历史区间，翻历史
    currentHistoryIndex++;
    const realPlayUrl = videoHistoryList[currentHistoryIndex];
    currentPlayOriginUrl = realPlayUrl; // 记录原始url
    //log("缓存播放，原始url：" + realPlayUrl);
    await getCachedVideoPlayUrl(realPlayUrl, false);
    showTip('切换下一个');
    // 恢复进度

async function loadWuLiSheSource() {

// DJ接口
async function loadDjSource() {
    djTriggeredSet.clear();
    if (isSourceLoading) return;
    isSourceLoading = true;
    try {
        const fetchRes = await fetch(reqApiUrl);
        if (!fetchRes.ok) throw new Error("接口请求失败");
        const htmlText = await fetchRes.text();

        // 解析列表页面（无正则 DOM解析）
        const parser = new DOMParser();
        const listDoc = parser.parseFromString(htmlText, "text/html");
        const liItems = listDoc.querySelectorAll('li.qui_list__item');

        const taskList = [];
        let i = 0; // 新增计数器
        for (const li of liItems) {
            const path = li.getAttribute("data-url");
            if (!path) continue;
            const detailUrl = new URL(path, reqApiUrl).href;
            const imgDom = li.querySelector('img.qui_list__img');
            const coverSrc = imgDom ? .getAttribute('src') || "";
            const index = i + 1; // 保存当前序号，闭包安全
            const task = async() => {
                try {
                    const detailResp = await fetch(detailUrl);
                    const detailHtml = await detailResp.text();
                    const detailDoc = parser.parseFromString(detailHtml, "text/html");
                    const videoDom = detailDoc.querySelector('#audiodiv');
                    const realVideoUrl = videoDom ? .getAttribute('src');
                    if (realVideoUrl) {
                        if (isVideoUrlRepeat(realVideoUrl)) {
                            log(`第${index}条视频重复/已看完，跳过本条`);
                            return null;
                        }
                        videoPlayList.push(realVideoUrl);
                        if (coverSrc) window.videoCoverMap.set(realVideoUrl, coverSrc);
                    }
                } catch (err) {
                    log("详情页解析失败" + detailUrl, err);
                }
            };
            taskList.push(task());
            i++;
        }
        await Promise.all(taskList);
    } catch (error) {
        showTip("DJ接口加载失败，2秒重试");
        log("DJ加载异常", error);
        if (!isSourceLoading) setTimeout(loadDjSource, 2000);
    } finally {
        isSourceLoading = false;
    }
}

// 全局页码变量
let nowPage = 1;
let nextPage = null;

async function loadJsonListSource() {
    jsonTriggeredSet.clear();
    if (isSourceLoading) return;
    isSourceLoading = true;

    // 兜底，解决你日志里 undefined.includes() 崩溃问题
    if (!reqApiUrl) {
        log("loadJsonList异常：全局reqApiUrl为空");
        isSourceLoading = false;
        return;
    }

    if (nextPage !== null) {
        nowPage = nextPage;
        nextPage = null;
    }

    try {
        // 重点：复制临时变量，所有拼接操作只操作副本！原始全局reqApiUrl保持原样
        let fetchUrl = reqApiUrl;
        const isNeedRandomPage = fetchUrl.includes("coop");
        if (isNeedRandomPage) {
            fetchUrl = fetchUrl + nowPage;
        }

        const fetchRes = await fetch(fetchUrl);
        const resData = await fetchRes.json();

        // 只给coop源执行分页逻辑
        if (isNeedRandomPage) {
            // 安全读取，校验数值有效性
            const totalPage = resData.content ? .totalPage;
            if (totalPage && typeof totalPage === "number" && totalPage > 0) {
                // 生成下一轮随机页码，防止连续同页
                let randomPage;
                do {
                    randomPage = Math.floor(Math.random() * totalPage) + 1;
                } while (randomPage === nowPage);
                nextPage = randomPage;
            } else {
                // 获取总页数失败，不清空nextPage，维持原有逻辑，避免页码越界
                log("coop源无法获取有效totalPage，暂不更新nextPage");
            }
        }

        let videoDataArr = resData.list || resData.data || [];
        if (isNeedRandomPage) {
            videoDataArr = resData.content ? .list || []
        }

        for (let i = 0; i < videoDataArr.length; i++) {
            const item = videoDataArr[i];
            const sourceUrl = item.video_url || item.content || item.playurl;
            if (sourceUrl) {
                if (isVideoUrlRepeat(sourceUrl)) {
                    log(`第${i+1}条视频历史重复，跳过本条`);
                    continue;
                }
                videoPlayList.push(sourceUrl);
                const coverImg = item.image || item.author_pic || item.picurl || "";
                window.videoCoverMap.set(sourceUrl, coverImg);
            }
        }
    } catch (error) {
        showTip("列表接口加载失败");
        log("loadJsonList异常：" + error);
    } finally {
        isSourceLoading = false;
    }
}

async function load591Source(isInitLoad = false) {
    five91TriggeredSet.clear();
    if (isSourceLoading) return;
    isSourceLoading = true;
    try {
        const fetchRes = await fetch(reqApiUrl);
        const resData = await fetchRes.text();
        let matchArr = resData.match(/https?:\/\/[^\s"'<>]+/g) || [];
        matchArr = matchArr.filter(url => /\.(mp4|m3u8|mov|flv)(\?|#|$)/.test(url));
        const uniqueSet = new Set(matchArr);
        matchArr = Array.from(uniqueSet);

        const temp = [...matchArr];
        for (let i = temp.length - 1; i > 0; i--) {
            const r = Math.floor(Math.random() * (i + 1));
            [temp[i], temp[r]] = [temp[r], temp[i]];
        }
        const random100Arr = temp.slice(0, 20);

        const validList = [];
        for (const url of random100Arr) {
            if (!isVideoUrlRepeat(url)) {
                validList.push(url);
            }
        }
        // 关键分支
        if (isInitLoad) {
            videoPlayList = validList;
        } else {
            // 预加载模式：追加到现有列表
            videoPlayList.push(...validList);
        }
    } catch (err) {
        log('请求591接口失败' + err);
    } finally {
        isSourceLoading = false;
    }
}

// 通用fetch回调封装
async function fetchSourceWithCallback() {
    return new Promise(resolve => {
        $.get(reqApiUrl, async(resData) => {
            try {
                let url = resData;
                let coverSrc = "";

                if (/ScSp|wp\.qinggongju|apihz|tucdn/.test(reqApiUrl)) {
                    url = resData.video || resData.视频 || resData.data || resData.mp4;
                    coverSrc = "";
                }
                if (/4qb|xzdx/.test(reqApiUrl)) {
                    url = resData.data.url;
                    coverSrc = resData.data.img; // 封面提取
                }
                if (!url.startsWith("http")) {
                    url = "https:" + url;
                }
                // 返回对象
                resolve({
                    videoUrl: url,
                    coverSrc: coverSrc
                });
            } catch (err) {
                resolve({
                    videoUrl: "",
                    coverSrc: ""
                });
            }
        })
    })
}


// 单源批量拉取N条
async function loadSingleSourceBatch(count = 3) {
    if (isSourceLoading) return;
    isSourceLoading = true;
    try {
        let successNum = 0;
        const maxLoop = 30;
        let loopCount = 0;

        while (successNum < count && loopCount < maxLoop) {
            loopCount++;
            let originVideoUrl = "";
            let coverSrc = "";

            const apiRule = /t=0|yujn|NewSp|jkapi/;
            if (apiRule.test(reqApiUrl)) {
                originVideoUrl = reqApiUrl;
                coverSrc = "";
            } else {
                const res = await fetchSourceWithCallback();
                originVideoUrl = res.videoUrl;
                coverSrc = res.coverSrc;
            }

            if (!originVideoUrl) continue;
            const realPlayUrl = await getFinalRedirectUrl(originVideoUrl);
            if (!realPlayUrl) continue;
            if (isVideoUrlRepeat(realPlayUrl)) {
                continue;
            }
            videoPlayList.push(realPlayUrl);
            if (coverSrc) {
                window.videoCoverMap.set(realPlayUrl, coverSrc);
            }
            successNum++;
        }
    } catch (err) {
        log("单源批量加载失败" + err);
    } finally {
        isSourceLoading = false;
    }
}

// 统一加载全部源
async function loadAllSource() {
    if (isSourceLoading) return;
    if (/wulishe/.test(reqApiUrl)) {
        await loadWuLiSheSource();
    } else if (/txqq|doumei|coop/.test(reqApiUrl)) {
        await loadJsonListSource();
    } else if (/591/.test(reqApiUrl)) {
        await load591Source(true);
    } else if (/kuaiyuhudong/.test(reqApiUrl)) {
        await loadDjSource();
    } else if (/v=0/.test(reqApiUrl)) {
        videoPlayerDom.src = reqApiUrl
    } else {
        await loadSingleSourceBatch(3);
    }
    await loadVideoFromList();
}

                            // log("不保存进度：url为空" + url);
                            return;
                        }
                        const realTotal = saveTotal;

                        // 条件1：短视频直接不保存
                        if (realTotal <= 10) {
                            //  log("视频时长不足10秒，不记录播放进度");
                            return;
                        }
                        // 条件2：播放前10秒，跳过本次保存
                        if (saveTime < 5) {
                            //  log("播放不足10秒，跳过保存");
                            return;
                        }
                        // 条件3：进度超过总时长，无效数据
                        if (saveTime >= realTotal) {
                            //  log("播放进度超出视频总时长，跳过保存");
                            return;
                        }
                        // 条件4：进度变化太小，无需重复写入
                        if (Math.abs(saveTime - lastSaveProgress) < 2) {
                            // log("进度变化小于2秒，无需重复保存");
                            return;
                        }
                        // 条件5：距离结尾不足10秒，清空历史进度
                        if (realTotal - saveTime < 5) {
                            await VideoDB.clearPlayProgress(url);
                            //   log("长视频快看完，清除进度记录" + url);
                            return;
                        }
                        // 全部校验通过，执行保存
                        await VideoDB.savePlayProgress(url, saveTime);
                        lastSaveProgress = saveTime;
                        //  log("✅成功保存进度，链接：" + url + " 当前播放秒数：" + saveTime);
                    } catch (err) {
                        log("保存进度发生异常：" + err);
                    }
                }, 300);


                // ========== 同步拖拽滑块 + 底部固定进度条 ==========
                const percent = (curSec / totalSec) * 100;
                // 1、弹窗拖拽滑块同步
                dragSliderDom.value = percent;
                // 2、页面底部绿色进度条同步（关键修复）
                document.getElementById("progress-bar").style.width = percent + "%";

                // 格式化时分秒
                const curTimeText = formatTime(curSec);
                const totalTimeText = formatTime(totalSec);

                // 3、底部左右时间文字更新
                document.getElementById("time-divs").textContent = curTimeText;
                document.getElementById("time-div").textContent = totalTimeText;
                // 4、弹窗拖拽面板时间更新
                dragCurTimeDom.innerText = curTimeText;
                dragTotalTimeDom.innerText = totalTimeText;

                if (isNaN(totalSec)) return;
            });




            dragSliderDom.addEventListener("input", () => {
                const val = dragSliderDom.value;
                videoPlayerDom.currentTime = (val / 100) * videoPlayerDom.duration;
                clearTimeout(dragProgressHideTimer);
                dragProgressHideTimer = setTimeout(() => dragProgressWrapDom.style.display = "none", 3000);
            })

            // 新增这段：拖动松手/点击完成后执行，只触发一次
            dragSliderDom.addEventListener("change", () => {
                // 当前暂停状态，拖动跳转后自动播放
                if (videoPlayerDom.paused) {
                    videoPlayerDom.play().catch(e => log("拖动后自动播放失败", e));
                }
            });

            videoPlayerDom.addEventListener('loadedmetadata', () => {
                totalTimeStr = formatTime(videoPlayerDom.duration);
                timeTotalDom.textContent = totalTimeStr;
                dragSliderDom.max = 100;
                dragTotalTimeDom.innerText = totalTimeStr;
            })



            dragSliderDom.addEventListener("input", () => {
                const val = dragSliderDom.value;
                videoPlayerDom.currentTime = (val / 100) * videoPlayerDom.duration;
                clearTimeout(dragProgressHideTimer);
                dragProgressHideTimer = setTimeout(() => dragProgressWrapDom.style.display = "none", 3000);
            })
            dragProgressWrapDom.addEventListener("click", e => e.stopPropagation());

            document.addEventListener("touchstart", (e) => {
                if (e.touches.length === 1) longTouchTimer = setTimeout(() => videoPlayerDom.playbackRate = 2, 300);
            }, {
                passive: true
            });
            document.addEventListener("touchend", () => {
                clearTimeout(longTouchTimer);
                videoPlayerDom.playbackRate = 1;
            }, {
                passive: true
            });

            $("#bth").on("click", function() {
                playAutoMode = !playAutoMode;
                this.innerText = playAutoMode ? '连播' : '循环';
                showTip(playAutoMode ? '已开启连续播放' : '已开启单曲循环');
                videoPlayerDom.play()
            });

            $("#ping").on("click", function() {
                this.innerText = this.innerText == '原始' ? '满屏' : '原始';
                videoPlayerDom.style.objectFit = this.innerText == '满屏' ? "cover" : "contain";
                videoPlayerDom.play()
            })

            $("#myVideo").on("error", async function() {
                //log(`下标${listIndex}视频加载失败，错误计数：${videoLoadErrorCount + 1}`);
                videoLoadErrorCount++;
                if (videoLoadErrorCount > 2) {
                    showTip("视频加载多次失败，停止重试");
                    videoLoadErrorCount = 0;
                    return;
                }
                listIndex++;
                setTimeout(() => loadVideoFromList(), 300);
            });

            videoPlayerDom.addEventListener('ended', async function() {
                pauseIconDom.style.opacity = 0
                // log('@@@@@@'+currentPlayOriginUrl)
                // 播放结束，清除当前视频进度记录
                if (currentPlayOriginUrl) {
                    await VideoDB.clearPlayProgress(currentPlayOriginUrl);
                    //log("视频播放完毕，清除进度：" + currentPlayOriginUrl);

                    // =====新增：完整播放完毕，记录到观看历史（仅在线模式，缓存不记录）=====
                    if (!isLocalCachePlay) {
                        markUrlFinished(currentPlayOriginUrl);
                    }
                }

                if (!playAutoMode) {
                    videoPlayerDom.play();
                    return;
                }
                // 新增：如果当前是缓存模式，先走缓存翻页逻辑
                if (isLocalCachePlay) {
                    if (nowCacheIndex < allCacheList.length - 1) {
                        nowCacheIndex++;
                        renderCachePlay(nowCacheIndex);
                    } else {
                        showTip("已看完所有缓存视频");
                        loadNextSource();
                    }
                    return;
                }
                //  listIndex++;      
                loadNextSource();
            }, false);



            $("#myVideo").on("dblclick", function() {
                if (videoPlayerDom.requestFullscreen) videoPlayerDom.requestFullscreen();
                else if (videoPlayerDom.webkitRequestFullscreen) videoPlayerDom.webkitRequestFullscreen();
                else if (videoPlayerDom.mozRequestFullScreen) videoPlayerDom.mozRequestFullScreen();
            });

            // 视频播放时：启动3秒自动隐藏按钮
            videoPlayerDom.addEventListener("play", () => {
                pauseIconDom.style.opacity = 0
                resetHideTimer();
                clearTimeout(dragProgressHideTimer);
                dragProgressHideTimer = setTimeout(() => dragProgressWrapDom.style.display = "none", 3000);
            });

            // 视频暂停时：直接销毁倒计时，永久保持按钮显示
            videoPlayerDom.addEventListener("pause", () => {
                pauseIconDom.style.opacity = 1;
                clearTimeout(hideTimer);
                clearTimeout(dragProgressHideTimer);
                dragProgressWrapDom.style.display = "block";
            });


            $("#myVideo").on("click", function() {
                if (sourceMenuOpen) return;
                const playIconOpacity = parseFloat(pauseIconDom.style.opacity) || 0;
                if (playIconOpacity === 0) {
                    // 播放 → 暂停
                    ctrlButtonsDom.style.opacity = 1;
                    // playIconDom.style.opacity = 1;
                    // pauseIconDom.style.opacity = 1;
                    videoPlayerDom.pause();
                    toggleDragProgressBar();
                } else {
                    // 暂停 → 播放
                    //  pauseIconDom.style.opacity = 0;
                    // ctrlButtonsDom.style.opacity = 0;
                    //playIconDom.style.opacity = 0;
                    videoPlayerDom.play();
                    //toggleDragProgressBar();
                    // 删掉这里所有resetHideTimer，交给上面play事件统一处理
                }
            });
            const appWrap = document.querySelector('.app');
            const btnBox = document.getElementById('buttons');
            //let hideTimer = null;
            function resetHideTimer() {
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => btnBox.style.opacity = 0, 3000);
            }

            appWrap.addEventListener('click', function(e) {
                if (e.target.tagName === "BUTTON") return;
                btnBox.style.opacity = 1;
                resetHideTimer();
                document.getElementById("options").style.display = "none";
            });
            document.querySelectorAll('#buttons button').forEach(btn => {
                if (btn.id === "yuan") return;
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    resetHideTimer();
                })
            });

            $(document).on("click", "#yuan", function(e) {
                e.stopPropagation();
                e.preventDefault();
                if (sourceMenuOpen) {
                    $("#options").hide();
                    sourceMenuOpen = false;
                    return;
                }
                renderSourceOptions(); // 调用1
                optDom = document.getElementById("options");
                sourceMenuOpen = true;
                optDom.style.display = "flex";
            });

            document.getElementById("clearCacheBtn").addEventListener("click", () => {
                if (confirm("确定清空所有本地缓存与播放历史？此操作不可恢复！")) {
                    clearAllVideoCache();
                }
            });

            $(document).on("click", function(event) {
                if (!$(event.target).closest("#yuan, .option").length && sourceMenuOpen) {
                    document.getElementById("options").style.display = "none";
                    sourceMenuOpen = false;
                    videoPlayerDom.play()
                    //playIconDom.style.opacity = 0;
                }
            });


            const cachePopupDom = document.getElementById("cachePopup");
            let popupTouchStartX = 0;
            let popupTouchStartY = 0; // 新增记录纵向起点

            cachePopupDom.addEventListener("touchstart", (e) => {
                popupTouchStartX = e.touches[0].clientX;
                popupTouchStartY = e.touches[0].clientY;
                e.stopPropagation();
            });

            cachePopupDom.addEventListener("touchend", (e) => {
                e.stopPropagation();
                if (!popupOpen) return;
                const touch = e.changedTouches[0];
                const endX = touch.clientX;
                const endY = touch.clientY;

                const diffX = endX - popupTouchStartX;
                const diffY = endY - popupTouchStartY;

                // 关键：纵向滑动距离大于横向 → 用户在上下滚动，不触发关闭
                if (Math.abs(diffY) > Math.abs(diffX)) {
                    return;
                }
                // 横向右滑超过阈值才关闭
                if (diffX > 80) {
                    closeCachePopup();
                }
            });
        });
        // ==============================================
    } catch (err) {
        log("启动初始化异常", err);
    }
}
// 统一入口启动，删掉原来直接调用 loadJquery();
startApp();


//滑动手势监听
document.addEventListener("touchstart", function(e) {
    // 新增：进度条区域过滤
    const progressBox = document.getElementById("dragProgressBox");
    const rect = progressBox.getBoundingClientRect();
    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;
    // 触摸点在进度条内，直接终止，不记录滑动起点
    if (tx >= rect.left && tx <= rect.right && ty >= rect.top && ty <= rect.bottom) {
        return;
    }

    touchStartX = e.touches[0].pageX;
    touchStartY = e.touches[0].pageY;
}, false);

document.addEventListener("touchend", function(e) {
    // 新增：进度条区域过滤
    const progressBox = document.getElementById("dragProgressBox");
    const rect = progressBox.getBoundingClientRect();
    const touch = e.changedTouches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;
    // 触摸点在进度条内，直接终止，不执行滑动判断
    if (tx >= rect.left && tx <= rect.right && ty >= rect.top && ty <= rect.bottom) {
        return;
    }

    if (popupOpen) return;
    const endX = e.changedTouches[0].pageX;
    const endY = e.changedTouches[0].pageY;
    const slideDir = getSlideDirection(touchStartX, touchStartY, endX, endY);
    switch (slideDir) {
        case 1:
            loadNextSource();
            break;
        case 3: // 左滑
            // 如果缓存弹窗已经打开，直接return不执行逻辑
            if (popupOpen) break;
            // 源列表弹窗打开，左滑直接关闭源列表
            if (sourceMenuOpen) {
                $("#options").hide();
                sourceMenuOpen = false;
                break;
            }
            // 无弹窗状态，左滑打开缓存弹窗
            $("#options").hide();
            sourceMenuOpen = false;
            openCacheListPopup();
            break;
        case 4: // 右滑
            // 新增：缓存弹窗打开时，直接阻断原有右滑逻辑
            if (popupOpen) {
                break;
            }
            // 无弹窗状态，右滑打开展源列表
            closeCachePopup();
            optDom = document.getElementById("options");
            renderSourceOptions();
            // 动画逻辑：先重置，再延时加show触发滑入动画
            optDom.classList.remove("show");
            optDom.style.display = "flex";
            setTimeout(() => {
                optDom.classList.add("show");
            }, 10)
            sourceMenuOpen = true;
            history.pushState({}, "", null);
            break;

        case 2:
            loadPrevSource();
            break;
    }
}, false)


// 页面初始化打开数据库
VideoDB.init();
